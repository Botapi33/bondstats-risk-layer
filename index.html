<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Global Risk</title>

<style>
body{
    margin:0;
    font-family:-apple-system, system-ui;
    background:linear-gradient(135deg,#0b1220,#0f1c2e);
    color:#fff;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:18px;
    padding:24px;
}

h1{font-size:28px;}

.signal{
    padding:16px;
    border-radius:12px;
    margin:20px 0;
    font-weight:600;
}

.red{background:#7a1f2a;}
.green{background:#1f6f3c;}
.gray{background:#3a3a3a;}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:14px;
    border-radius:10px;
}

.value{font-size:20px;font-weight:bold;}

@media(max-width:700px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Global Risk Regime</h1>
<div id="meta">Loading...</div>

<div id="signalBox" class="signal gray"></div>

<div class="grid">
<div class="box"><div>Rising vs Falling</div><div id="rf" class="value"></div></div>
<div class="box"><div>Conviction</div><div id="conv" class="value"></div></div>
<div class="box"><div>Average Move</div><div id="avg" class="value"></div></div>
<div class="box"><div>Top Drivers</div><div id="drivers" class="value"></div></div>
</div>

</div>
</div>

<script>

const URL = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

fetch(URL)
.then(r => r.json())
.then(data => {

    const countries = Object.values(data.countries)
        .filter(c => c.change !== null);

    const rising = countries.filter(c => c.change > 0);
    const falling = countries.filter(c => c.change < 0);

    const total = countries.length;
    const ratio = rising.length / total;

    let signal = "";
    let color = "gray";

    if (ratio > 0.65) {
        signal = "Global tightening — yields rising";
        color = "red";
    } else if (ratio < 0.35) {
        signal = "Global easing — yields falling";
        color = "green";
    } else {
        signal = "Mixed global conditions";
    }

    const avg = (
        countries.reduce((a,c)=>a+Math.abs(c.change),0) / total
    ).toFixed(2);

    const conviction = Math.min(100, Math.round(avg * 200));

    const drivers = [...countries]
        .sort((a,b)=>Math.abs(b.change)-Math.abs(a.change))
        .slice(0,3)
        .map(c=>c.label)
        .join(", ");

    document.getElementById("meta").innerText =
        "Updated: " + data.meta.lastUpdated;

    document.getElementById("signalBox").innerText = signal;
    document.getElementById("signalBox").className = "signal " + color;

    document.getElementById("rf").innerText =
        rising.length + " / " + falling.length;

    document.getElementById("conv").innerText =
        conviction + "/100";

    document.getElementById("avg").innerText = avg;

    document.getElementById("drivers").innerText = drivers;

})
.catch(e=>{
    document.getElementById("meta").innerText = "Error loading data";
    console.error(e);
});

</script>

</body>
</html>
