<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Global Risk</title>

<style>
body{
    margin:0;
    font-family:-apple-system, system-ui;
    background:linear-gradient(135deg,#0b1220,#0f1c2e);
    color:#fff;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:18px;
    padding:24px;
    backdrop-filter:blur(10px);
}

h1{
    font-size:30px;
    margin-bottom:5px;
}

.meta{
    opacity:0.6;
    margin-bottom:20px;
}

.signal{
    font-size:20px;
    padding:16px;
    border-radius:12px;
    margin-bottom:20px;
    font-weight:600;
}

.red{background:#7a1f2a;}
.green{background:#1f6f3c;}
.gray{background:#3a3a3a;}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:14px;
    border-radius:10px;
}

.label{
    font-size:12px;
    opacity:0.6;
}

.value{
    font-size:22px;
    font-weight:700;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Global Risk Regime</h1>
<div id="meta" class="meta">Loading...</div>

<div id="signalBox" class="signal gray">Loading...</div>

<div class="grid">

<div class="box">
<div class="label">Breadth</div>
<div id="breadth" class="value"></div>
</div>

<div class="box">
<div class="label">Conviction</div>
<div id="conviction" class="value"></div>
</div>

<div class="box">
<div class="label">Average Move</div>
<div id="avgMove" class="value"></div>
</div>

<div class="box">
<div class="label">Top Drivers</div>
<div id="drivers" class="value" style="font-size:14px;"></div>
</div>

</div>

</div>
</div>

<script>

const URL = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

fetch(URL)
.then(r => r.json())
.then(data => {

    const risk = data.risk;

    // fallback wenn risk fehlt
    if(!risk){
        document.getElementById("meta").innerText = "No risk data available";
        return;
    }

    let color = "gray";

    if(risk.regime === "tightening") color = "red";
    if(risk.regime === "easing") color = "green";

    document.getElementById("meta").innerText =
        "Updated: " + data.meta.lastUpdated;

    document.getElementById("signalBox").innerText =
        risk.signal;

    document.getElementById("signalBox").className =
        "signal " + color;

    document.getElementById("breadth").innerText =
        risk.breadth + "%";

    document.getElementById("conviction").innerText =
        risk.conviction + "/100";

    document.getElementById("avgMove").innerText =
        risk.avgMove;

    document.getElementById("drivers").innerText =
        risk.topDrivers.join(", ");

})
.catch(err=>{
    document.getElementById("meta").innerText = "Error loading data";
    console.error(err);
});

</script>

</body>
</html>
